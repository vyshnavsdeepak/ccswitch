name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: tar -C target/${{ matrix.target }}/release -czf ccswitch-${{ matrix.target }}.tar.gz ccswitch

      - uses: actions/upload-artifact@v4
        with:
          name: ccswitch-${{ matrix.target }}
          path: ccswitch-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Compute checksums
        id: sha
        run: |
          echo "arm=$(sha256sum dist/ccswitch-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86=$(sha256sum dist/ccswitch-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/ccswitch-aarch64-apple-darwin.tar.gz \
            dist/ccswitch-x86_64-apple-darwin.tar.gz \
            dist/ccswitch-x86_64-unknown-linux-gnu.tar.gz

      - name: Update Homebrew formula
        env:
          VERSION: ${{ github.ref_name }}
          ARM_SHA: ${{ steps.sha.outputs.arm }}
          X86_SHA: ${{ steps.sha.outputs.x86 }}
        run: |
          sed -i \
            -e "s|version \"[^\"]*\" # VERSION|version \"${VERSION#v}\" # VERSION|" \
            -e "s|download/v[^/]*/ccswitch-aarch64-apple-darwin.tar.gz\" # ARM_URL|download/${VERSION}/ccswitch-aarch64-apple-darwin.tar.gz\" # ARM_URL|" \
            -e "s|sha256 \"[^\"]*\" # ARM_SHA|sha256 \"${ARM_SHA}\" # ARM_SHA|" \
            -e "s|download/v[^/]*/ccswitch-x86_64-apple-darwin.tar.gz\" # X86_URL|download/${VERSION}/ccswitch-x86_64-apple-darwin.tar.gz\" # X86_URL|" \
            -e "s|sha256 \"[^\"]*\" # X86_SHA|sha256 \"${X86_SHA}\" # X86_SHA|" \
            Formula/ccswitch.rb

      - name: Commit formula update
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ccswitch.rb
          git diff --staged --quiet || git commit -m "chore: update formula to ${VERSION}"
          git pull --rebase origin main
          git push
